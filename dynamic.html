<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic — Amber Hanson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #1a3a5c;
    --red: #8b1a1a;
    --white: #ffffff;
    --black: #0a0a0a;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--white);
    color: var(--black);
    font-family: 'Lora', serif;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1.5rem 2rem;
    background: var(--white);
  }

  .nav-name {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
    opacity: 0.9;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-links a {
    color: var(--black);
    text-decoration: none;
    opacity: 0.45;
    transition: opacity 0.2s;
  }

  .nav-links a:hover { opacity: 1; }
  .nav-links a.active { opacity: 1; color: var(--blue); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 6rem 2rem 5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(10,10,10,0.1);
    border: 1px solid rgba(10,10,10,0.1);
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }

  .project-card {
    display: block;
    text-decoration: none;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  .project-card:hover .thumb img {
    opacity: 0.85;
  }

  .project-card:hover .project-title {
    color: var(--blue);
  }

  .thumb {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: #1a1a1a;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  .project-meta {
    padding: 1.25rem 1.5rem 1.5rem;
    border-top: 1px solid rgba(10,10,10,0.08);
  }

  .project-title {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--black);
    transition: color 0.2s;
    margin-bottom: 0.35rem;
  }

  .project-tags {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: rgba(10,10,10,0.4);
    text-transform: uppercase;
  }

</style>
</head>
<body>

<nav>
  <a class="nav-name" href="index.html">Amber Hanson</a>
  <div class="nav-links">
    <a href="index.html">STATIC</a>
    <a href="dynamic.html" class="active">DYNAMIC</a>
    <a href="information.html">INFORMATION</a>
  </div>
</nav>

<main>
  <div class="grid">

    <a class="project-card" href="panoptic-pollution.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Panotpic Pollution Thumbnail.jpg" alt="Panoptic Pollution">
      </div>
      <div class="project-meta">
        <p class="project-title">Panoptic Pollution</p>
        <p class="project-tags">installation, web-based</p>
      </div>
    </a>

    <a class="project-card" href="mellow.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Mellow Thumbnail.png" alt="Mellow">
      </div>
      <div class="project-meta">
        <p class="project-title">Mellow</p>
        <p class="project-tags">video, installation</p>
      </div>
    </a>

    <a class="project-card" href="yolk.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Yolk Thumbnail.jpg" alt="Yolk">
      </div>
      <div class="project-meta">
        <p class="project-title">Yolk</p>
        <p class="project-tags">installation, projection</p>
      </div>
    </a>

    <a class="project-card" href="presence-persistence.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Presence Persistence Thumbnail.jpg" alt="Presence Persistence">
      </div>
      <div class="project-meta">
        <p class="project-title">Presence / Persistence</p>
        <p class="project-tags">web-based, video, text</p>
      </div>
    </a>

    <a class="project-card" href="grey-tolerance.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Grey Tolerance Thumbnail.jpg" alt="Grey Tolerance">
      </div>
      <div class="project-meta">
        <p class="project-title">Grey Tolerance</p>
        <p class="project-tags">web-based, screen recording</p>
      </div>
    </a>

    <a class="project-card" href="atlas-interference.html">
      <div class="thumb">
        <img src="Dynamic/Thumbnails/Atlas Interference Thumbnail.png" alt="Atlas Interference">
      </div>
      <div class="project-meta">
        <p class="project-title">Atlas Interference</p>
        <p class="project-tags">browser-based, generative</p>
      </div>
    </a>

  </div>
</main>

</body>
</html>
